server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
 
    # React router — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # Proxy API calls to MCM backend
    # Frontend calls /api/* → nginx forwards to host.docker.internal:8081
    # This means frontend doesn't need to know the backend URL at runtime
    location /api/ {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}