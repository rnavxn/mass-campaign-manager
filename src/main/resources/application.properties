spring.application.name=mass-campaign-manager

# Environmental Variables
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# URL of your dist-job-processor
job.processor.url=http://localhost:8080

#app.self.base-url=http://host.docker.internal:8081
app.self.base-url=http://${LAN_IP_ADDRESS}:8081

server.address=0.0.0.0
server.port=8081


# Campaign defaults
campaign.default.chunk-size=50
campaign.default.rate-limit=10

management.endpoints.web.exposure.include=health,prometheus